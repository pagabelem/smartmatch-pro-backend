[pytest]
# Configuration de base
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Affichage détaillé et couverture
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80
    --cov=app --cov-report=term-missing --cov-fail-under=70
    

# Markers personnalisés
markers =
    asyncio: tests asynchrones (pytest-asyncio)
    unit: tests unitaires (sans BDD)
    integration: tests d'intégration (avec BDD SQLite)
    slow: tests lents (NLP réel, gros fichiers)

# Ignorer les warnings non critiques
filterwarnings =
    ignore::DeprecationWarning
    ignore::sqlalchemy.exc.SAWarning
    ignore::UserWarning:pydantic.*


